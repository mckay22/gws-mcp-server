name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs, not tags: a tag is mutable, and this
      # job holds contents:write and publishes the binaries users download.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      # A tag must not publish binaries that were never tested: releases are the
      # one artifact users take on trust, and a tag can be cut from any commit.
      - name: Test before releasing
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi
          go vet ./...
          go test -race ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS="${target%/*}"; GOARCH="${target#*/}"
            out="gws-mcp-server-${VERSION}-${GOOS}-${GOARCH}"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${out}${ext}" .
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip "${out}.zip" "${out}${ext}" && rm "${out}${ext}")
            else
              (cd dist && tar -czf "${out}.tar.gz" "${out}${ext}" && rm "${out}${ext}")
            fi
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
